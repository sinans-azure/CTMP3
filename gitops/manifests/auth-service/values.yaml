replicaCount: 1

image:
  repository: ctmp3acr.azurecr.io/auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: azure-application-gateway
  annotations:
    kubernetes.io/ingress.class: azure-application-gateway
    appgw.ingress.kubernetes.io/health-probe-path: /health
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: "sneakertail-cert"
  hosts:
    - host: api.training.sneakertail.online
      paths:
        - path: /api/auth
          pathType: Prefix
  tls:
    - secretName: sneakertail-cert
      hosts:
        - api.training.sneakertail.online

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  USE_ENTRA_DB_AUTH: "true"
  DB_USER: "ctmp3-workload-identity"

keyvaultName: "ctmp3-kv"
tenantId: "3e054dd4-88ff-476b-a5bc-14338ac07215"

workloadIdentity:
  clientId: "SET_BY_TERRAFORM_OUTPUT_WORKLOAD_IDENTITY_CLIENT_ID"

configMapName: auth-service-config
secretName: auth-service-secrets
