apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: training-portal
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-service
        app.kubernetes.io/component: api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ctmp-workload-sa
      containers:
        - name: billing-service
          image: ctmp3acr.azurecr.io/billing-service:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: USE_ENTRA_DB_AUTH
              value: "true"
            - name: DB_USER
              value: "ctmp3-workload-identity"
          envFrom:
            - configMapRef:
                name: billing-service-config
                optional: true
            - secretRef:
                name: billing-service-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
