apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    appgw.ingress.kubernetes.io/backend-path-prefix: /
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: "sneakertail-cert"
    appgw.ingress.kubernetes.io/backend-protocol: "https"
spec:
  ingressClassName: azure-application-gateway
  tls:
    - hosts:
        - argocd.training.sneakertail.online
      secretName: sneakertail-cert
  rules:
    - host: argocd.training.sneakertail.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: https
