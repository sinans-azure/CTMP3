# ============================================================================
# ArgoCD Application: Billing Service (AWS cost tracking)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: training-portal
    app.kubernetes.io/component: api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd-image-updater.argoproj.io/image-list: billing=ctmp3acr.azurecr.io/billing-service
    argocd-image-updater.argoproj.io/billing.update-strategy: newest-build
    argocd-image-updater.argoproj.io/billing.force-update: "true"
    argocd-image-updater.argoproj.io/write-back-method: git
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/ctmp3.git
    targetRevision: HEAD
    path: src/services/billing-service/k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: training-portal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
