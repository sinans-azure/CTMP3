# ============================================================================
# ArgoCD Application: Admin Service (User management & audit logging)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: training-portal
    app.kubernetes.io/component: api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sinans-azure/CTMP3.git
    targetRevision: HEAD
    path: gitops/manifests/admin-service/
  destination:
    server: https://kubernetes.default.svc
    namespace: training-portal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
