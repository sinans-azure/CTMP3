# ============================================================================
# ArgoCD Application: Trainer Service (AWS OIDC template builder)
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trainer-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: training-portal
    app.kubernetes.io/component: api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd-image-updater.argoproj.io/image-list: trainer=ctmp3acr.azurecr.io/trainer-service
    argocd-image-updater.argoproj.io/trainer.update-strategy: semver
    argocd-image-updater.argoproj.io/trainer.allow-tags: regexp:^0\.0\.[0-9]+$
    argocd-image-updater.argoproj.io/trainer.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/trainer.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/trainer.force-update: "true"
    argocd-image-updater.argoproj.io/write-back-method: git
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sinans-azure/CTMP3.git
    targetRevision: HEAD
    path: gitops/manifests/trainer-service/
  destination:
    server: https://kubernetes.default.svc
    namespace: training-portal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
