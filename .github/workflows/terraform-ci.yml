name: "Infrastructure & Services CI/CD"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true
  ACR_NAME: ctmp3acr
  ACR_LOGIN_SERVER: ctmp3acr.azurecr.io

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Detect which paths changed for selective processing
  # ──────────────────────────────────────────────────────────────
  detect-changes:
    name: "Detect Changed Paths"
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      auth-service: ${{ steps.filter.outputs.auth-service }}
      admin-service: ${{ steps.filter.outputs.admin-service }}
      trainer-service: ${{ steps.filter.outputs.trainer-service }}
      student-service: ${{ steps.filter.outputs.student-service }}
      billing-service: ${{ steps.filter.outputs.billing-service }}
      analytics-service: ${{ steps.filter.outputs.analytics-service }}
      frontend: ${{ steps.filter.outputs.frontend }}
      functions: ${{ steps.filter.outputs.functions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
            auth-service:
              - 'src/services/auth-service/**'
            admin-service:
              - 'src/services/admin-service/**'
            trainer-service:
              - 'src/services/trainer-service/**'
            student-service:
              - 'src/services/student-service/**'
            billing-service:
              - 'src/services/billing-service/**'
            analytics-service:
              - 'src/services/analytics-service/**'
            frontend:
              - 'src/frontend/**'
            functions:
              - 'src/functions/**'

  # ──────────────────────────────────────────────────────────────
  # Job 2: Terraform — Plan on PRs, Apply on merge to main
  # ──────────────────────────────────────────────────────────────
  terraform:
    name: "Terraform"
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC — no secrets stored)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-ctmp3-tfstate" \
            -backend-config="storage_account_name=stctmp3tfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=ctmp3.terraform.tfstate"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## Terraform Plan Results 🏗️

            #### Format Check 🖌 \`${{ steps.fmt.outcome }}\`
            #### Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            > Triggered by **@${{ github.actor }}** on \`${{ github.event.pull_request.head.ref }}\`
            > *Commit: ${{ github.event.pull_request.head.sha }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────────────────────
  # Job 3: Build & Push Docker images for changed microservices
  # ──────────────────────────────────────────────────────────────
  build-services:
    name: "Build ${{ matrix.service }}"
    needs: detect-changes
    if: >-
      github.ref == 'refs/heads/main' && github.event_name == 'push' && (
        needs.detect-changes.outputs.auth-service == 'true' ||
        needs.detect-changes.outputs.admin-service == 'true' ||
        needs.detect-changes.outputs.trainer-service == 'true' ||
        needs.detect-changes.outputs.student-service == 'true' ||
        needs.detect-changes.outputs.billing-service == 'true' ||
        needs.detect-changes.outputs.analytics-service == 'true' ||
        needs.detect-changes.outputs.frontend == 'true' ||
        needs.detect-changes.outputs.functions == 'true'
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: ./src/services/auth-service
            changed: ${{ needs.detect-changes.outputs.auth-service }}
          - service: admin-service
            context: ./src/services/admin-service
            changed: ${{ needs.detect-changes.outputs.admin-service }}
          - service: trainer-service
            context: ./src/services/trainer-service
            changed: ${{ needs.detect-changes.outputs.trainer-service }}
          - service: student-service
            context: ./src/services/student-service
            changed: ${{ needs.detect-changes.outputs.student-service }}
          - service: billing-service
            context: ./src/services/billing-service
            changed: ${{ needs.detect-changes.outputs.billing-service }}
          - service: analytics-service
            context: ./src/services/analytics-service
            changed: ${{ needs.detect-changes.outputs.analytics-service }}
          - service: frontend
            context: ./src/frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}
          - service: functions
            context: ./src/functions
            changed: ${{ needs.detect-changes.outputs.functions }}
    steps:
      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        if: matrix.changed == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        if: matrix.changed == 'true'
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Job 4: Lint & validate on PRs (fast feedback)
  # ──────────────────────────────────────────────────────────────
  lint:
    name: "Lint & Validate"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          find src/services -name "*.py" -exec python -m py_compile {} \;
          find src/functions -name "*.py" -exec python -m py_compile {} \;

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Kubernetes manifests
        run: |
          echo "Validating K8s YAML syntax..."
          find src/services -name "*.yaml" -path "*/k8s/*" -exec python -c "
          import yaml, sys
          with open(sys.argv[1]) as f:
              try:
                  list(yaml.safe_load_all(f))
                  print(f'✅ {sys.argv[1]}')
              except yaml.YAMLError as e:
                  print(f'❌ {sys.argv[1]}: {e}')
                  sys.exit(1)
          " {} \;

      - name: Validate GitOps manifests
        run: |
          pip install pyyaml
          find gitops -name "*.yaml" -exec python -c "
          import yaml, sys
          with open(sys.argv[1]) as f:
              try:
                  list(yaml.safe_load_all(f))
                  print(f'✅ {sys.argv[1]}')
              except yaml.YAMLError as e:
                  print(f'❌ {sys.argv[1]}: {e}')
                  sys.exit(1)
          " {} \;
