name: "Infrastructure Destroy (Terraform)"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true
  TF_VAR_user_portal_client_id: ${{ secrets.NEXT_PUBLIC_AZURE_AD_CLIENT_ID }}

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Runner IP and Key Vault Name
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org | tr -d '\r')
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          echo "TF_VAR_runner_ip=$RUNNER_IP" >> $GITHUB_ENV
          
          # Find the Key Vault name
          echo "Searching for Key Vault name..."
          KEY_VAULT_NAME=$(az keyvault list --query "[?contains(name, 'ctmp3-kv')].name" -o tsv | head -n 1 | tr -d '\r')
          if [ -z "$KEY_VAULT_NAME" ]; then
            KEY_VAULT_NAME=$(az keyvault list --query "[?tags.project=='ctmp3'].name" -o tsv | head -n 1 | tr -d '\r')
          fi
          if [ -n "$KEY_VAULT_NAME" ]; then
            echo "KEY_VAULT_NAME=$KEY_VAULT_NAME" >> $GITHUB_ENV
            echo "Found Key Vault Name: $KEY_VAULT_NAME"
          else
            echo "Key Vault not found."
          fi

      - name: Whitelist IP in Key Vault
        if: env.KEY_VAULT_NAME != ''
        run: |
          echo "Adding firewall rule for IP ${{ env.RUNNER_IP }} on Key Vault ${{ env.KEY_VAULT_NAME }}..."
          az keyvault network-rule add --name "${{ env.KEY_VAULT_NAME }}" --ip-address "${{ env.RUNNER_IP }}"
          # Sleep to allow rule propagation
          sleep 60

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-ctmp3-tfstate" \
            -backend-config="storage_account_name=stctmp3tfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=ctmp3.terraform.tfstate"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Remove IP from Key Vault Firewall
        if: always() && env.RUNNER_IP != '' && env.KEY_VAULT_NAME != ''
        run: |
          echo "Removing firewall rule for IP ${{ env.RUNNER_IP }} from Key Vault ${{ env.KEY_VAULT_NAME }}..."
          az keyvault network-rule remove --name "${{ env.KEY_VAULT_NAME }}" --ip-address "${{ env.RUNNER_IP }}"
